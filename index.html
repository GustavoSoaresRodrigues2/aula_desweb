<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Template HTML</title>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    body {
      margin: 15px;
      padding: 15px;
    }
    .div-um {
      width: 768px;
      background-color: rgb(190, 80, 190);
      padding: 15px;
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .lab-nome {
      display: block;
      margin: 5px;
    }
    .input-nome {
      border-radius: 15px;
      padding: 10px;
      border: none;
      outline: none;
    }
    .btn-enviar {
      padding: 10px;
      background-color: blueviolet;
      border-radius: 15px;
      border: none;
    }
  </style>

        Enviar
      </button>
    </div> -->

</html>
